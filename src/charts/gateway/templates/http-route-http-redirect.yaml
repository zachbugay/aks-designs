apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https-redirect
  namespace: infra
  labels:
    {{- include "gateway.httpRedirect.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: agc-gateway
      namespace: infra
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
