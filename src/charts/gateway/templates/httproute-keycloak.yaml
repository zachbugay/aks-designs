apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-keycloak
  namespace: infra
  labels:
    {{- include "gateway.routeKeycloak.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: agc-gateway
      namespace: infra
  hostnames:
    - {{ .Values.identityProviderHostname | quote }}
  rules:
    - backendRefs:
        - name: keycloak
          namespace: identity
          port: 8080
