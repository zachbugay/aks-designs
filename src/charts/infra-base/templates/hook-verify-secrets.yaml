apiVersion: batch/v1
kind: Job
metadata:
  name: verify-secrets-sync
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "infra-base.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        {{- include "infra-base.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: verify-secrets-sync
      containers:
        - name: verify
          image: alpine/kubectl:latest
          command: ["/bin/sh", "/scripts/verify-secrets.sh"]
          env:
            - name: NAMESPACE
              value: {{ .Values.namespace | quote }}
            - name: MAX_RETRIES
              value: "60"
            - name: RETRY_INTERVAL
              value: "5"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: scripts
          configMap:
            name: verify-secrets-script
            defaultMode: 0755
