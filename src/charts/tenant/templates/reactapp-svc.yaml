apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.reactApp.name }}
  namespace: {{ .Values.tenantName }}
  labels:
    {{- include "tenant.reactApp.labels" . | nindent 4 }}
spec:
  ports:
    - protocol: TCP
      port: {{ .Values.reactApp.port }}
      targetPort: http
      name: http
  selector:
    {{- include "tenant.reactApp.selectorLabels" . | nindent 4 }}
  type: ClusterIP
