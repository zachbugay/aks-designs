# ---------------------------------------------------------------
# CiliumNetworkPolicy — React App ingress on port 8080
#
# Allows inbound TCP traffic to frontend pods on port 8080.
# L7 HTTP enforcement is handled by Istio AuthorizationPolicy
# (ap-reactapp.yaml).
#
# Prerequisites:
#   - Azure CNI powered by Cilium (network_dataplane = "cilium")
#   - Advanced Container Networking Services (ACNS) enabled
#     with advanced_network_policies = "FQDN"
# ---------------------------------------------------------------
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: reactapp-ingress
  namespace: {{ .Values.tenantName }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: frontend
  ingress:
    - toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
