# ---------------------------------------------------------------
# Zero-trust foundation
#
# Kubernetes NetworkPolicy establishes explicit deny-all for both
# ingress and egress.  CiliumNetworkPolicy (cilium-network-policy.yaml)
# then selectively opens the exact L7 HTTP paths each workload needs.
#
# K8s NP and CiliumNetworkPolicy rules are additive — the union of
# allow rules from both policy types determines what is permitted.
# ---------------------------------------------------------------

# 1. Default deny all ingress and egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: {{ .Values.tenantName }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# 2. Allow DNS resolution (CoreDNS in kube-system, port 53)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: {{ .Values.tenantName }}
  labels:
    {{- include "tenant.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
